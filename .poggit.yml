--- # Poggit-CI Manifest. Open the CI at https://poggit.pmmp.io/ci/MEMOxiiii/LuckPerms
projects:
  LuckPerms:
    path: ""
    icon: "icon.png"
    excludeDirs:
      - .github
      - build
    excludeFiles:
      - .gitignore
      - CONTRIBUTING.md
      - SECURITY.md
      - phpstan.neon.dist
      - phpstan-baseline.php
      - .php-cs-fixer.php
    lint:
      phpstan:
        enabled: true
        cmd: vendor/bin/phpstan
        config: phpstan.neon.dist
...
