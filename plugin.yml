name: LuckPerms
main: jasonw4331\LuckPerms\LuckPerms
src-namespace-prefix: jasonw4331\LuckPerms
version: 1.0.0
api: [5.0.0]
load: STARTUP
author: jasonw4331
description: A permissions plugin for PocketMine-MP servers based on lucko/LuckPerms
website: https://luckperms.net

commands:
  luckperms:
    description: Manage permissions
    aliases: [lp, perm, perms, permission, permissions]
    permission: luckperms.command

permissions:
  luckperms.command:
    description: Allows use of LuckPerms commands
    default: op
  luckperms.user.info:
    description: Allows viewing user info
    default: op
  luckperms.user.parent.add:
    description: Allows adding a parent group to a user
    default: op
  luckperms.user.parent.remove:
    description: Allows removing a parent group from a user
    default: op
  luckperms.user.permission.set:
    description: Allows setting a permission for a user
    default: op
  luckperms.user.permission.unset:
    description: Allows unsetting a permission for a user
    default: op
  luckperms.group.info:
    description: Allows viewing group info
    default: op
  luckperms.group.parent.add:
    description: Allows adding a parent group to a group
    default: op
  luckperms.group.parent.remove:
    description: Allows removing a parent group from a group
    default: op
  luckperms.group.permission.set:
    description: Allows setting a permission for a group
    default: op
  luckperms.group.permission.unset:
    description: Allows unsetting a permission for a group
    default: op
  luckperms.editor:
    description: Allows using the web editor
    default: op
  luckperms.applyedits:
    description: Allows applying web editor changes
    default: op
  luckperms.sync:
    description: Allows syncing data
    default: op
  luckperms.info:
    description: Allows viewing LuckPerms info
    default: op
  luckperms.creategroup:
    description: Allows creating groups
    default: op
  luckperms.deletegroup:
    description: Allows deleting groups
    default: op
  luckperms.listgroups:
    description: Allows listing groups
    default: op
  luckperms.createtrack:
    description: Allows creating tracks
    default: op
  luckperms.deletetrack:
    description: Allows deleting tracks
    default: op
  luckperms.listtracks:
    description: Allows listing tracks
    default: op
  luckperms.track.info:
    description: Allows viewing track info
    default: op
  luckperms.track.append:
    description: Allows appending a group to a track
    default: op
  luckperms.track.insert:
    description: Allows inserting a group into a track
    default: op
  luckperms.track.remove:
    description: Allows removing a group from a track
    default: op
  luckperms.user.setweight:
    description: Allows setting user weight
    default: op
  luckperms.group.setweight:
    description: Allows setting group weight
    default: op
  luckperms.group.setdisplayname:
    description: Allows setting group display name
    default: op
  luckperms.user.meta.set:
    description: Allows setting meta for a user
    default: op
  luckperms.user.meta.unset:
    description: Allows unsetting meta for a user
    default: op
  luckperms.user.meta.clear:
    description: Allows clearing meta for a user
    default: op
  luckperms.group.meta.set:
    description: Allows setting meta for a group
    default: op
  luckperms.group.meta.unset:
    description: Allows unsetting meta for a group
    default: op
  luckperms.group.meta.clear:
    description: Allows clearing meta for a group
    default: op